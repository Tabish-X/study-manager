<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Study Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1 class="topbar-title">Personal Study Manager</h1>
  <div class="account-wrapper" id="account-wrapper">
    <button class="account-icon-btn" id="account-btn" aria-label="Account">
      <span id="account-initials">?</span>
    </button>
    <div class="account-dropdown" id="account-dropdown">
      <div class="account-avatar-large"><span id="dropdown-initials"></span></div>
      <p class="dropdown-name"  id="dropdown-name">Loading…</p>
      <p class="dropdown-email" id="dropdown-email"></p>
      <button id="logout-btn" class="logout-dropdown-btn">Logout</button>
    </div>
  </div>
</div>

<!-- NAV BAR -->
<div class="nav-bar">
  <button class="nav-btn active" data-section="subjects">Subjects</button>
  <button class="nav-btn" data-section="topics">Topics</button>
  <button class="nav-btn" data-section="notes">Notes</button>
  <button class="nav-btn" data-section="files">Files</button>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <section id="subjects-section" class="content-section active">
    <h2>Add New Subject</h2>
    <div class="form-group">
      <input type="text" id="subject-name" placeholder="Subject name">
    </div>
    <button id="add-subject-btn">Add Subject</button>
    <h3 style="margin-top:20px">Your Subjects</h3>
    <div id="subjects-list"></div>
  </section>

  <section id="topics-section" class="content-section">
    <h2>Add Topic</h2>
    <div class="form-group">
      <select id="topic-subject-selector"></select>
    </div>
    <div class="form-group">
      <input type="text" id="topic-name" placeholder="Topic name">
    </div>
    <button id="add-topic-btn">Add Topic</button>
    <h3 style="margin-top:20px">Your Topics</h3>
    <div id="topics-list"></div>
  </section>

  <section id="notes-section" class="content-section">
    <h2>Add Note</h2>
    <div class="form-group">
      <select id="note-subject-selector"><option value="">-- Select Subject (optional) --</option></select>
    </div>
    <div class="form-group">
      <select id="note-topic-selector"><option value="">-- Select Topic (optional) --</option></select>
    </div>
    <div class="form-group">
      <input type="text" id="note-title" placeholder="Note title">
    </div>
    <div class="form-group">
      <textarea id="note-content" placeholder="Note content…"></textarea>
    </div>
    <button id="add-note-btn">Add Note</button>
    <h3 style="margin-top:20px">Your Notes</h3>
    <div id="notes-list"></div>
  </section>

  <section id="files-section" class="content-section">
    <h2>Upload Files</h2>
    <div class="form-group">
      <select id="subject-selector"></select>
    </div>
    <div class="form-group">
      <input type="file" id="file-upload" multiple>
    </div>
    <button id="upload-files-btn">Upload Files</button>
    <div id="upload-status" style="margin-top:10px;font-size:0.95rem;min-height:1.2em;"></div>
    <h3 style="margin-top:20px">Your Files</h3>
    <div id="uploaded-files-list"></div>
  </section>

</div>

<!-- EDIT NOTE MODAL -->
<div id="edit-modal" style="
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);z-index:8000;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:12px;padding:24px;width:min(94%,520px);
      display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
    <h2 style="margin:0;color:#333;">Edit Note</h2>
    <input id="edit-note-title" type="text" placeholder="Note title"
      style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:1rem;">
    <textarea id="edit-note-content" placeholder="Note content…"
      style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;
        font-size:1rem;min-height:140px;resize:vertical;"></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="closeEditModal()"
        style="background:#aaa;color:white;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;">
        Cancel
      </button>
      <button onclick="saveEditedNote()"
        style="background:#4a6fa5;color:white;border:none;padding:9px 18px;
          border-radius:6px;cursor:pointer;font-weight:600;">
        Save
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }                        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc }            from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDZJ9XseeGuBVkmhb5-HrcwRSVAChXs8WI",
    authDomain:        "study-manager-f9333.firebaseapp.com",
    projectId:         "study-manager-f9333",
    storageBucket:     "study-manager-f9333.firebasestorage.app",
    messagingSenderId: "169786797073",
    appId:             "1:169786797073:web:6254390c0d98f7f7f355b0",
    measurementId:     "G-V802KRGFYM"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  window.firestoreDb = db;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    window.currentUser = user;
    try {
      const snap     = await getDoc(doc(db, "users", user.uid));
      const fullName = snap.exists() ? (snap.data().fullName || user.email) : user.email;
      const initials = fullName.split(" ").filter(Boolean)
        .map(w => w[0]).join("").toUpperCase().slice(0, 2);
      document.getElementById("account-initials").textContent  = initials;
      document.getElementById("dropdown-initials").textContent = initials;
      document.getElementById("dropdown-name").textContent     = fullName;
      document.getElementById("dropdown-email").textContent    = user.email;
    } catch (_) {
      document.getElementById("account-initials").textContent = "?";
      document.getElementById("dropdown-name").textContent    = user.email;
    }
  });

  document.getElementById("account-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    document.getElementById("account-dropdown").classList.toggle("open");
  });
  document.addEventListener("click", () => {
    document.getElementById("account-dropdown").classList.remove("open");
  });
  document.getElementById("logout-btn").addEventListener("click", () => {
    signOut(auth).then(() => { window.location.href = "login.html"; });
  });
</script>

<script type="module" src="script.js"></script>

</body>
</html>
